spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/${DB_NAME:retail_db}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
      timeout: 5s

applet:
  auth:
    test-mode: false

jwt:
  secret: ${JWT_SECRET}
  expire-minutes: ${JWT_EXPIRE_MINUTES:120}

ai:
  service-url: ${AI_SERVICE_URL:http://localhost:8000}
