server:
  port: 8080

spring:
  application:
    name: retail-server
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

camera:
  agent:
    default-port: 8765
    discovery-port: 8766
  scheduler:
    interval-minutes: 5
    batch-size: 10
    auto-disable-unavailable: true

logging:
  file:
    name: ./log/retail-server.log
  charset:
    file: UTF-8
    console: UTF-8
  level:
    root: info
    com.retail.server.controller.CameraController: info
    com.retail.server.scheduler.CameraScanScheduler: info
